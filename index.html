<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Jogo 3D - Câmera 360° com Mouse</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; cursor: none; }
    #info {
      position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7);
      padding: 15px; border-radius: 8px; font-family: Arial, sans-serif; z-index: 100;
    }
  </style>
</head>
<body>
  <div id="info">
    WASD ou Setas = Mover<br>
    CAPS LOCK = Turbo (mais rápido)<br>
    Mouse = Girar câmera 360° livremente
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x88aaff);
    scene.fog = new THREE.Fog(0x88aaff, 100, 450);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luzes
    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(50, 120, 80);
    scene.add(dirLight);

    // Chão com textura de estrada
    const textureLoader = new THREE.TextureLoader();
    const groundTexture = textureLoader.load("https://img.freepik.com/fotos-gratis/textura-da-estrada-preto_1160-806.jpg?semt=ais_hybrid&w=740&q=80");
    groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(30, 30);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(400, 400),
      new THREE.MeshLambertMaterial({ map: groundTexture })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Obstáculos
    const boxMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
    for (let i = 0; i < 25; i++) {
      const box = new THREE.Mesh(new THREE.BoxGeometry(5, 6, 5), boxMat);
      box.position.set(Math.random() * 200 - 100, 3, Math.random() * 200 - 100);
      scene.add(box);
    }

    // Personagem
    const player = new THREE.Group();
    scene.add(player);

    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.8, 0.8, 3.2, 16),
      new THREE.MeshLambertMaterial({ color: 0x1565C0 })
    );
    body.position.y = 1.8;
    player.add(body);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.9, 16, 16),
      new THREE.MeshLambertMaterial({ color: 0xFFDBAC })
    );
    head.position.y = 3.9;
    player.add(head);

    // ====================== CONTROLES ======================
    const keys = {};
    let isCapsLock = false;
    let yaw = 0;        // rotação horizontal da câmera
    let pitch = -15;    // inclinação vertical da câmera (graus)

    window.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (e.getModifierState && e.getModifierState('CapsLock')) isCapsLock = true;
    });

    window.addEventListener('keyup', e => {
      keys[e.key.toLowerCase()] = false;
      if (e.getModifierState && !e.getModifierState('CapsLock')) isCapsLock = false;
    });

    // Controle do mouse (360°)
    let isMouseDown = false;
    document.addEventListener('mousedown', () => isMouseDown = true);
    document.addEventListener('mouseup', () => isMouseDown = false);

    document.addEventListener('mousemove', (e) => {
      if (!isMouseDown) return;
      yaw -= e.movementX * 0.2;     // sensibilidade horizontal
      pitch -= e.movementY * 0.15;  // sensibilidade vertical
      pitch = Math.max(-60, Math.min(60, pitch)); // limita o olhar para cima/baixo
    });

    const normalSpeed = 0.35;
    const boostSpeed = 0.78;

    function updateMovement() {
      const currentSpeed = isCapsLock ? boostSpeed : normalSpeed;

      let dx = 0, dz = 0;
      if (keys['w'] || keys['arrowup'])    dz -= 1;
      if (keys['s'] || keys['arrowdown'])  dz += 1;
      if (keys['a'] || keys['arrowleft'])  dx -= 1;
      if (keys['d'] || keys['arrowright']) dx += 1;

      if (dx !== 0 || dz !== 0) {
        const len = Math.hypot(dx, dz);
        dx /= len; dz /= len;

        // Move o personagem na direção que ele está olhando (baseado na rotação yaw)
        const moveAngle = yaw * Math.PI / 180;
        player.position.x += (dx * Math.cos(moveAngle) - dz * Math.sin(moveAngle)) * currentSpeed;
        player.position.z += (dx * Math.sin(moveAngle) + dz * Math.cos(moveAngle)) * currentSpeed;

        // Faz o personagem olhar para a direção do movimento
        player.lookAt(
          player.position.x + (dx * Math.cos(moveAngle) - dz * Math.sin(moveAngle)),
          player.position.y,
          player.position.z + (dx * Math.sin(moveAngle) + dz * Math.cos(moveAngle))
        );
      }
    }

    function updateCamera() {
      const distance = 28;
      const height = 12;

      const radYaw = yaw * Math.PI / 180;
      const radPitch = pitch * Math.PI / 180;

      camera.position.x = player.position.x - distance * Math.sin(radYaw) * Math.cos(radPitch);
      camera.position.z = player.position.z - distance * Math.cos(radYaw) * Math.cos(radPitch);
      camera.position.y = player.position.y + height + distance * Math.sin(radPitch);

      camera.lookAt(player.position.x,
