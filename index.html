<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Jogo 3D - Câmera 360° Melhorado</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; cursor: none; }
    #info {
      position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.75);
      padding: 15px; border-radius: 10px; font-family: Arial, sans-serif; z-index: 100;
      user-select: none; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="info">
    W / Seta ↑ = Acelerar<br>
    S / Seta ↓ = Frear / Ré<br>
    A / D ou Setas ← → = Virar<br>
    Clique + Arrastar Mouse = Girar câmera 360°
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x88aaff, 150, 600);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Luzes
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
    dirLight.position.set(60, 150, 100);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Skybox (céu bonito)
    const skyLoader = new THREE.CubeTextureLoader();
    const skybox = skyLoader.load([
      'https://threejs.org/examples/textures/cube/skybox/px.jpg',
      'https://threejs.org/examples/textures/cube/skybox/nx.jpg',
      'https://threejs.org/examples/textures/cube/skybox/py.jpg',
      'https://threejs.org/examples/textures/cube/skybox/ny.jpg',
      'https://threejs.org/examples/textures/cube/skybox/pz.jpg',
      'https://threejs.org/examples/textures/cube/skybox/nz.jpg'
    ]);
    scene.background = skybox;

    // Chão com textura de asfalto boa
    const textureLoader = new THREE.TextureLoader();
    const groundTexture = textureLoader.load('https://polyhaven.com/a/asphalt_02?download=jpg&size=4k');
    groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(60, 60);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(800, 800),
      new THREE.MeshLambertMaterial({ map: groundTexture })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Obstáculos
    for (let i = 0; i < 40; i++) {
      const height = Math.random() * 8 + 4;
      const mat = Math.random() > 0.5 ? 
        new THREE.MeshLambertMaterial({ color: 0x555555 }) : 
        new THREE.MeshLambertMaterial({ color: 0x8B4513 });
      
      const box = new THREE.Mesh(new THREE.BoxGeometry(6, height, 6), mat);
      box.position.set(Math.random() * 400 - 200, height/2, Math.random() * 400 - 200);
      box.castShadow = true;
      box.receiveShadow = true;
      scene.add(box);
    }

    // Personagem (melhor visual)
    const player = new THREE.Group();
    scene.add(player);

    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(1, 1.2, 3.5, 20),
      new THREE.MeshLambertMaterial({ color: 0x1565C0 })
    );
    body.position.y = 2;
    body.castShadow = true;
    player.add(body);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(1.1, 24, 24),
      new THREE.MeshLambertMaterial({ color: 0xFFDBAC })
    );
    head.position.y = 4.2;
    head.castShadow = true;
    player.add(head);

    // Olhos simples
    const eyeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), eyeMat);
    eyeL.position.set(-0.4, 4.4, 0.9);
    player.add(eyeL);
    const eyeR = eyeL.clone();
    eyeR.position.x = 0.4;
    player.add(eyeR);

    // =============== CONTROLES ===============
    const keys = {};
    let yaw = 0;        // rotação do personagem
    let cameraYaw = 0;  // rotação horizontal da câmera
    let cameraPitch = -20;

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

    let isMouseDown = false;
    document.addEventListener('mousedown', () => isMouseDown = true);
    document.addEventListener('mouseup', () => isMouseDown = false);
    document.addEventListener('mouseleave', () => isMouseDown = false);

    document.addEventListener('mousemove', (e) => {
      if (!isMouseDown) return;
      cameraYaw -= e.movementX * 0.3;
      cameraPitch -= e.movementY * 0.25;
      cameraPitch = Math.max(-70, Math.min(50, cameraPitch));
    });

    let speed = 0;
    const maxSpeed = 1.2;
    const acceleration = 0.04;
    const deceleration = 0.06;

    function updateMovement() {
      // Acelerar / frear
      if (keys['w'] || keys['arrowup']) {
        speed = Math.min(speed + acceleration, maxSpeed);
      } else if (keys['s'] || keys['arrowdown']) {
        speed = Math.max(speed - acceleration * 1.8, -maxSpeed * 0.6);
      } else {
        speed *= 0.92; // desaceleração natural
      }

      // Virar
      const turnSpeed = 2.5 * (Math.abs(speed) + 0.2);
      if (keys['a'] || keys['arrowleft'])  yaw += turnSpeed;
      if (keys['d'] || keys['arrowright']) yaw -= turnSpeed;

      // Aplicar movimento
      if (Math.abs(speed) > 0.01) {
        const rad = yaw * Math.PI / 180;
        player.position.x += Math.sin(rad) * speed;
        player.position.z += Math.cos(rad) * speed;

        // Personagem olha para onde está indo
        player.rotation.y = rad + Math.PI;
      }
    }

    function updateCamera() {
      const distance = 32;
      const height = 14;

      const radYaw = cameraYaw * Math.PI / 180;
      const radPitch = cameraPitch * Math.PI / 180;

      camera.position.x = player.position.x - distance * Math.sin(radYaw) * Math.cos(radPitch);
      camera.position.z = player.position.z - distance * Math.cos(radYaw) * Math.cos(radPitch);
      camera.position.y = player.position.y + height + distance * Math.sin(radPitch);

      camera.lookAt(player.position.x, player.position.y + 3.5, player.position.z);
    }

    function animate() {
      requestAnimationFrame(animate);
      updateMovement();
      updateCamera();
      renderer.render(scene, camera);
    }

    animate();

    // Responsivo
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
