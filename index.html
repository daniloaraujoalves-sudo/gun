<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Soldier Ops 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="overlay">
        <div class="menu-box">
            <h1>MISSION START</h1>
            <input type="text" id="username" placeholder="NOME DO AGENTE">
            <button onclick="startGame()">INICIAR</button>
            <button onclick="showRank()">RANKING</button>
        </div>
    </div>

    <div id="game-ui" style="display: none;">
        <div id="info">W,A,S,D para mover | Mouse para girar</div>
        <div id="minimap"><canvas id="mapCanvas" width="200" height="200"></canvas></div>
        <div id="crosshair"></div>
        <div id="score-display">KILLS: <span id="kill-count">0</span></div>
    </div>

    <div id="rank-screen" class="overlay" style="display: none;">
        <div class="menu-box">
            <h1>TOP AGENTES</h1>
            <ul id="rank-list"></ul>
            <button onclick="hideRank()">VOLTAR</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.min.js"></script>
    
    <script src="rank.js"></script>
    <script src="enemies.js"></script>
    <script src="game.js"></script>
</body>
</html>
