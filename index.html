<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Jogo 3D - Movimento na Direção da Câmera</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; cursor: none; }
    #info {
      position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.8);
      padding: 15px; border-radius: 10px; font-family: Arial, sans-serif; z-index: 100;
      user-select: none; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="info">
    W / ↑ = Andar para onde a câmera está olhando<br>
    S / ↓ = Andar para trás (oposto da câmera)<br>
    A / ← = Andar para a esquerda da câmera<br>
    D / → = Andar para a direita da câmera<br>
    Clique + Arrastar = Girar a câmera
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x88aaff, 200, 800);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(80, 120, 60);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const skyLoader = new THREE.CubeTextureLoader();
    scene.background = skyLoader.load([
      'https://threejs.org/examples/textures/cube/skybox/px.jpg',
      'https://threejs.org/examples/textures/cube/skybox/nx.jpg',
      'https://threejs.org/examples/textures/cube/skybox/py.jpg',
      'https://threejs.org/examples/textures/cube/skybox/ny.jpg',
      'https://threejs.org/examples/textures/cube/skybox/pz.jpg',
      'https://threejs.org/examples/textures/cube/skybox/nz.jpg'
    ]);

    const textureLoader = new THREE.TextureLoader();
    const groundTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/grasslight-big.jpg');
    groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(80, 80);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), 
      new THREE.MeshLambertMaterial({ map: groundTexture }));
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Obstáculos
    for (let i = 0; i < 50; i++) {
      const h = Math.random() * 9 + 4;
      const box = new THREE.Mesh(
        new THREE.BoxGeometry(7, h, 7),
        new THREE.MeshLambertMaterial({ color: Math.random() > 0.5 ? 0x555555 : 0x8B4513 })
      );
      box.position.set(Math.random()*500-250, h/2, Math.random()*500-250);
      box.castShadow = true;
      box.receiveShadow = true;
      scene.add(box);
    }

    // Personagem
    const player = new THREE.Group();
    scene.add(player);
    const body = new THREE.Mesh(new THREE.CylinderGeometry(1.1, 1.3, 3.8, 24), 
      new THREE.MeshLambertMaterial({ color: 0x1565C0 }));
    body.position.y = 2.1;
    body.castShadow = true;
    player.add(body);

    const head = new THREE.Mesh(new THREE.SphereGeometry(1.15, 32, 32), 
      new THREE.MeshLambertMaterial({ color: 0xFFDBAC }));
    head.position.y = 4.6;
    head.castShadow = true;
    player.add(head);

    const eyeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.28, 20, 20), eyeMat);
    eyeL.position.set(-0.45, 4.8, 0.95);
    player.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = 0.45;
    player.add(eyeR);

    // ===================== CONTROLES =====================
    const keys = {};
    let cameraYaw = 0;
    let cameraPitch = -25;

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

    let isMouseDown = false;
    document.addEventListener('mousedown', () => isMouseDown = true);
    document.addEventListener('mouseup',   () => isMouseDown = false);
    document.addEventListener('mouseleave',() => isMouseDown = false);

    document.addEventListener('mousemove', e => {
      if (!isMouseDown) return;
      cameraYaw -= e.movementX * 0.4;
      cameraPitch -= e.movementY * 0.35;
      cameraPitch = Math.max(-75, Math.min(55, cameraPitch));
    });

    let speed = 0;
    const maxSpeed = 1.45;
    const acceleration = 0.06;
    const deceleration = 0.08;

    function updateMovement() {
      let forward = 0;
      let strafe  = 0;

      if (keys['w'] || keys['arrowup'])    forward = 1;
      if (keys['s'] || keys['arrowdown'])  forward = -1;
      if (keys['a'] || keys['arrowleft'])  strafe  = -1;
      if (keys['d'] || keys['arrowright']) strafe  = 1;

      // Normaliza diagonal
      if (forward !== 0 && strafe !== 0) {
        forward *= 0.7071;
        strafe  *= 0.7071;
      }

      // Direção baseada na câmera (isso é o que você pediu)
      const angle = cameraYaw * Math.PI / 180;

      const moveX = Math.sin(angle) * forward + Math.cos(angle) * strafe;
      const moveZ = Math.cos(angle) * forward - Math.sin(angle) * strafe;

      // Aceleração suave
      const targetSpeed = (forward !== 0 || strafe !== 0) ? maxSpeed : 0;
      if (targetSpeed > speed) speed += acceleration;
      else speed = Math.max(speed - deceleration, 0);

      if (speed > 0.01) {
        player.position.x += moveX * speed;
        player.position.z += moveZ * speed;

        // Personagem olha para a direção do movimento
        player.rotation.y = Math.atan2(moveX, moveZ) + Math.PI;
      }
    }

    function updateCamera() {
      const dist = 35;
      const height = 15;
      const ry = cameraYaw * Math.PI / 180;
      const rp = cameraPitch * Math.PI / 180;

      camera.position.x = player.position.x - dist * Math.sin(ry) * Math.cos(rp);
      camera.position.z = player.position.z - dist * Math.cos(ry) * Math.cos(rp);
      camera.position.y = player.position.y + height + dist * Math.sin(rp);

      camera.lookAt(player.position.x, player.position.y + 4, player.position.z);
    }

    function animate() {
      requestAnimationFrame(animate);
      updateMovement();
      updateCamera();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
