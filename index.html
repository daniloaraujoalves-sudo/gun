<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Jogo 3D - Terceira Pessoa com Textura de Estrada</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #info {
      position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7);
      padding: 15px; border-radius: 8px; font-family: Arial, sans-serif; z-index: 100;
    }
  </style>
</head>
<body>
  <div id="info">
    WASD ou Setas ←↑→↓ para mover<br>
    Textura de estrada aplicada no chão!
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luzes
    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
    dirLight.position.set(50, 100, 50);
    scene.add(dirLight);

    // === CHÃO COM TEXTURA DE ESTRADA ===
    const textureLoader = new THREE.TextureLoader();

    const groundTexture = textureLoader.load(
      "https://img.freepik.com/fotos-gratis/textura-da-estrada-preto_1160-806.jpg?semt=ais_hybrid&w=740&q=80",
      () => console.log("✅ Textura de estrada carregada!"),
      undefined,
      (err) => console.error("Erro ao carregar textura:", err)
    );

    // Repete a textura várias vezes para ficar melhor
    groundTexture.wrapS = THREE.RepeatWrapping;
    groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(20, 20);   // quanto maior, mais repetições

    const groundMaterial = new THREE.MeshLambertMaterial({
      map: groundTexture,
      side: THREE.DoubleSide
    });

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(300, 300),
      groundMaterial
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Obstáculos (cubos marrons)
    const boxMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
    for (let i = 0; i < 25; i++) {
      const box = new THREE.Mesh(new THREE.BoxGeometry(4, 6, 4), boxMat);
      box.position.set(Math.random() * 160 - 80, 3, Math.random() * 160 - 80);
      scene.add(box);
    }

    // Personagem simples
    const player = new THREE.Group();
    scene.add(player);

    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.8, 0.8, 3.2, 16),
      new THREE.MeshLambertMaterial({ color: 0x1565C0 })
    );
    body.position.y = 1.8;
    player.add(body);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.9, 16, 16),
      new THREE.MeshLambertMaterial({ color: 0xFFDBAC })
    );
    head.position.y = 3.9;
    player.add(head);

    // Controles
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

    const speed = 0.35;

    function updateCamera() {
      const offset = new THREE.Vector3(0, 12, 25);
      offset.applyQuaternion(player.quaternion);
      camera.position.copy(player.position).add(offset);
      camera.lookAt(player.position.x, player.position.y + 3, player.position.z);
    }

    function animate() {
      requestAnimationFrame(animate);

      let dx = 0, dz = 0;
      if (keys['w'] || keys['arrowup'])    dz -= 1;
      if (keys['s'] || keys['arrowdown'])  dz += 1;
      if (keys['a'] || keys['arrowleft'])  dx -= 1;
      if (keys['d'] || keys['arrowright']) dx += 1;

      if (dx !== 0 || dz !== 0) {
        const len = Math.hypot(dx, dz);
        dx /= len; dz /= len;

        player.position.x += dx * speed;
        player.position.z += dz * speed;

        player.lookAt(player.position.x + dx, player.position.y, player.position.z + dz);
      }

      updateCamera();
      renderer.render(scene, camera);
    }

    camera.position.set(0, 20, 40);
    updateCamera();
    animate();

    // Responsivo
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
