<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Cenário 3D Simples - Three.js</title>
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    // Cena, câmera e renderizador
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Chão (plano verde)
    const groundGeometry = new THREE.PlaneGeometry(100, 100);
    const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x228B22 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Alguns cubos como "árvores" ou obstáculos
    const boxMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
    for (let i = 0; i < 20; i++) {
      const box = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), boxMaterial);
      box.position.set(Math.random() * 80 - 40, 2, Math.random() * 80 - 40);
      scene.add(box);
    }

    // Luzes
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(50, 100, 50);
    scene.add(directionalLight);

    // Céu (cor de fundo)
    scene.background = new THREE.Color(0x87CEEB);

    camera.position.set(0, 10, 30);
    camera.lookAt(0, 0, 0);

    // Animação (rotação suave da câmera ou movimento)
    function animate() {
      requestAnimationFrame(animate);
      // Exemplo: câmera orbita devagar
      camera.position.x = Math.sin(Date.now() * 0.0002) * 30;
      camera.position.z = Math.cos(Date.now() * 0.0002) * 30;
      camera.lookAt(0, 0, 0);
      renderer.render(scene, camera);
    }
    animate();

    // Responsivo
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
