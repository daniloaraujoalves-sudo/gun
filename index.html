<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Jogo 3D com Personagem em Terceira Pessoa - Three.js</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #instructions {
      position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); color: white;
      padding: 10px; border-radius: 8px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="instructions">
    WASD ou Setas ←↑→↓ para mover<br>
    O personagem vai olhar para a direção do movimento
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    // Cena básica
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // céu azul

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luzes
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
    directionalLight.position.set(50, 100, 30);
    scene.add(directionalLight);

    // Chão
    const groundGeometry = new THREE.PlaneGeometry(200, 200);
    const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x228B22 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Alguns obstáculos (cubos marrons)
    const boxMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
    for (let i = 0; i < 30; i++) {
      const size = Math.random() * 3 + 2;
      const box = new THREE.Mesh(new THREE.BoxGeometry(size, size * 2, size), boxMaterial);
      box.position.set(
        Math.random() * 140 - 70,
        size,
        Math.random() * 140 - 70
      );
      scene.add(box);
    }

    // === PERSONAGEM ===
    const player = new THREE.Group();
    scene.add(player);

    // Corpo (capsule)
    const bodyGeometry = new THREE.CapsuleGeometry(0.8, 2.5, 8, 16);
    const bodyMaterial = new THREE.MeshLambertMaterial({ color: 0x1565C0 });
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.position.y = 1.8;
    player.add(body);

    // Cabeça
    const headGeometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
    const headMaterial = new THREE.MeshLambertMaterial({ color: 0xFFDBAC });
    const head = new THREE.Mesh(headGeometry, headMaterial);
    head.position.y = 3.8;
    player.add(head);

    // Posição inicial
    player.position.set(0, 0, 0);

    // Variáveis de movimento
    const moveSpeed = 0.25;
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

    // Câmera em terceira pessoa (distância e altura)
    let cameraOffset = new THREE.Vector3(0, 8, 15); // atrás e acima

    function updateCamera() {
      const idealOffset = cameraOffset.clone().applyQuaternion(player.quaternion);
      camera.position.copy(player.position).add(idealOffset);
      camera.lookAt(player.position.x, player.position.y + 2, player.position.z);
    }

    // Loop principal
    function animate() {
      requestAnimationFrame(animate);

      let moved = false;
      const direction = new THREE.Vector3();

      if (keys['w'] || keys['arrowup'])    direction.z -= 1;
      if (keys['s'] || keys['arrowdown'])  direction.z += 1;
      if (keys['a'] || keys['arrowleft'])  direction.x -= 1;
      if (keys['d'] || keys['arrowright']) direction.x += 1;

      if (direction.length() > 0) {
        direction.normalize();

        // Move o personagem
        player.position.x += direction.x * moveSpeed;
        player.position.z += direction.z * moveSpeed;

        // Rotaciona o personagem para olhar na direção do movimento
        player.lookAt(
          player.position.x + direction.x,
          player.position.y,
          player.position.z + direction.z
        );

        moved = true;
      }

      updateCamera();
      renderer.render(scene, camera);
    }

    animate();

    // Responsivo
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
