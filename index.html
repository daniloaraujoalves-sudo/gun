<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Jogo 3D - Terceira Pessoa com Céu e Boost (Caps Lock)</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #info {
      position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7);
      padding: 15px; border-radius: 8px; font-family: Arial, sans-serif; z-index: 100;
    }
  </style>
</head>
<body>
  <div id="info">
    WASD ou Setas ←↑→↓ para mover<br>
    <strong>CAPS LOCK</strong> = Turbo (mais rápido)<br>
    Céu atualizado!
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();

    // ====================== CÉU BONITO ======================
    scene.background = new THREE.Color(0x88aaff); // azul mais bonito

    // Adiciona uma névoa suave (fica mais atmosférico)
    scene.fog = new THREE.Fog(0x88aaff, 100, 400);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luzes
    scene.add(new THREE.AmbientLight(0xffffff, 0.85));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(50, 120, 80);
    scene.add(dirLight);

    // === CHÃO COM TEXTURA DE ESTRADA (a que você pediu) ===
    const textureLoader = new THREE.TextureLoader();
    const groundTexture = textureLoader.load(
      "https://img.freepik.com/fotos-gratis/textura-da-estrada-preto_1160-806.jpg?semt=ais_hybrid&w=740&q=80"
    );
    groundTexture.wrapS = THREE.RepeatWrapping;
    groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(30, 30);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(400, 400),
      new THREE.MeshLambertMaterial({ map: groundTexture })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Obstáculos
    const boxMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
    for (let i = 0; i < 25; i++) {
      const box = new THREE.Mesh(new THREE.BoxGeometry(5, 6, 5), boxMat);
      box.position.set(Math.random() * 200 - 100, 3, Math.random() * 200 - 100);
      scene.add(box);
    }

    // Personagem
    const player = new THREE.Group();
    scene.add(player);

    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.8, 0.8, 3.2, 16),
      new THREE.MeshLambertMaterial({ color: 0x1565C0 })
    );
    body.position.y = 1.8;
    player.add(body);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.9, 16, 16),
      new THREE.MeshLambertMaterial({ color: 0xFFDBAC })
    );
    head.position.y = 3.9;
    player.add(head);

    // ====================== CONTROLES ======================
    const keys = {};
    let isCapsLock = false;

    window.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (e.getModifierState && e.getModifierState('CapsLock')) {
        isCapsLock = true;
      }
    });

    window.addEventListener('keyup', e => {
      keys[e.key.toLowerCase()] = false;
      if (e.getModifierState && !e.getModifierState('CapsLock')) {
        isCapsLock = false;
      }
    });

    const normalSpeed = 0.35;
    const boostSpeed = 0.75;

    function updateCamera() {
      const offset = new THREE.Vector3(0, 12, 25);
      offset.applyQuaternion(player.quaternion);
      camera.position.copy(player.position).add(offset);
      camera.lookAt(player.position.x, player.position.y + 3, player.position.z);
    }

    function animate() {
      requestAnimationFrame(animate);

      const currentSpeed = isCapsLock ? boostSpeed : normalSpeed;

      let dx = 0, dz = 0;
      if (keys['w'] || keys['arrowup'])    dz -= 1;
      if (keys['s'] || keys['arrowdown'])  dz += 1;
      if (keys['a'] || keys['arrowleft'])  dx -= 1;
      if (keys['d'] || keys['arrowright']) dx += 1;

      if (dx !== 0 || dz !== 0) {
        const len = Math.hypot(dx, dz);
        dx /= len; dz /= len;

        player.position.x += dx * currentSpeed;
        player.position.z += dz * currentSpeed;

        player.lookAt(player.position.x + dx, player.position.y, player.position.z + dz);
      }

      updateCamera();
      renderer.render(scene, camera);
    }

    camera.position.set(0, 20, 40);
    updateCamera();
    animate();

    // Responsivo
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
