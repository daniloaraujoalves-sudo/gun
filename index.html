<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Jogo 3D - Movimento Fluido + Cursor Central</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #000; 
      cursor: none; 
    }
    #info {
      position: absolute; top: 10px; left: 10px; color: white; 
      background: rgba(0,0,0,0.75); padding: 15px; border-radius: 10px; 
      font-family: Arial, sans-serif; z-index: 100; user-select: none; line-height: 1.6;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 200;
      opacity: 0.85;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
    }
    #crosshair::before {
      width: 100%;
      height: 2px;
      top: 9px;
    }
    #crosshair::after {
      width: 2px;
      height: 100%;
      left: 9px;
    }
  </style>
</head>
<body>
  <div id="info">
    W / ↑ = Andar para onde a câmera está olhando<br>
    S / ↓ = Andar para trás<br>
    A / ← = Esquerda relativa à câmera<br>
    D / → = Direita relativa à câmera<br>
    Clique + Arrastar = Girar câmera 360°
  </div>

  <!-- Cursor no centro -->
  <div id="crosshair"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x88aaff, 180, 750);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.65));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.35);
    dirLight.position.set(70, 130, 80);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Skybox
    const skyLoader = new THREE.CubeTextureLoader();
    scene.background = skyLoader.load([
      'https://threejs.org/examples/textures/cube/skybox/px.jpg',
      'https://threejs.org/examples/textures/cube/skybox/nx.jpg',
      'https://threejs.org/examples/textures/cube/skybox/py.jpg',
      'https://threejs.org/examples/textures/cube/skybox/ny.jpg',
      'https://threejs.org/examples/textures/cube/skybox/pz.jpg',
      'https://threejs.org/examples/textures/cube/skybox/nz.jpg'
    ]);

    // Chão
    const textureLoader = new THREE.TextureLoader();
    const groundTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/grasslight-big.jpg');
    groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(80, 80);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1200, 1200),
      new THREE.MeshLambertMaterial({ map: groundTexture })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Obstáculos
    for (let i = 0; i < 50; i++) {
      const h = Math.random() * 9 + 4;
      const box = new THREE.Mesh(
        new THREE.BoxGeometry(7, h, 7),
        new THREE.MeshLambertMaterial({ color: Math.random() > 0.5 ? 0x555555 : 0x8B4513 })
      );
      box.position.set(Math.random()*550-275, h/2, Math.random()*550-275);
      box.castShadow = true;
      box.receiveShadow = true;
      scene.add(box);
    }

    // Personagem
    const player = new THREE.Group();
    scene.add(player);

    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(1.1, 1.3, 3.8, 24),
      new THREE.MeshLambertMaterial({ color: 0x1565C0 })
    );
    body.position.y = 2.1;
    body.castShadow = true;
    player.add(body);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(1.15, 32, 32),
      new THREE.MeshLambertMaterial({ color: 0xFFDBAC })
    );
    head.position.y = 4.6;
    head.castShadow = true;
    player.add(head);

    const eyeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.28, 20, 20), eyeMat);
    eyeL.position.set(-0.45, 4.8, 0.95);
    player.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = 0.45;
    player.add(eyeR);

    // ===================== CONTROLES =====================
    const keys = {};
    let cameraYaw = 0;
    let cameraPitch = -28;

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

    let isMouseDown = false;
    document.addEventListener('mousedown', () => isMouseDown = true);
    document.addEventListener('mouseup',   () => isMouseDown = false);
    document.addEventListener('mouseleave',() => isMouseDown = false);

    document.addEventListener('mousemove', e => {
      if (!isMouseDown) return;
      cameraYaw -= e.movementX * 0.42;
      cameraPitch -= e.movementY * 0.36;
      cameraPitch = Math.max(-78, Math.min(58, cameraPitch));
    });

    let currentSpeed = 0;
    let currentDirection = 0; // ângulo atual do movimento (suavizado)

    const maxSpeed = 1.6;
    const acceleration = 0.085;
    const deceleration = 0.095;

    function updateMovement() {
      let forward = 0;
      let strafe = 0;

      if (keys['w'] || keys['arrowup']) forward = 1;
      if (keys['s'] || keys['arrowdown']) forward = -1;
      if (keys['a'] || keys['arrowleft']) strafe = -1;
      if (keys['d'] || keys['arrowright']) strafe = 1;

      if (forward !== 0 && strafe !== 0) {
        forward *= 0.7071;
        strafe *= 0.7071;
      }

      const cameraAngle = cameraYaw * Math.PI / 180;

           const targetMoveX = Math.sin(cameraAngle) * forward - Math.cos(cameraAngle) * strafe;
      const targetMoveZ = Math.cos(cameraAngle) * forward + Math.sin(cameraAngle) * strafe;
      const targetDirection = Math.atan2(targetMoveX, targetMoveZ);

      // Suaviza a direção (fica bem mais fluido)
      if (forward !== 0 || strafe !== 0) {
        currentDirection = currentDirection * 0.82 + targetDirection * 0.18;
      }

      // Aceleração / desaceleração suave
      const targetSpeed = (forward !== 0 || strafe !== 0) ? maxSpeed : 0;
      if (targetSpeed > currentSpeed) {
        currentSpeed += acceleration;
      } else {
        currentSpeed = Math.max(currentSpeed - deceleration, 0);
      }

      if (currentSpeed > 0.02) {
        player.position.x += Math.sin(currentDirection) * currentSpeed;
        player.position.z += Math.cos(currentDirection) * currentSpeed;

        // Rotação suave do personagem
        player.rotation.y = currentDirection + Math.PI;
      }
    }

    function updateCamera() {
      const distance = 36;
      const height = 16;
      const ry = cameraYaw * Math.PI / 180;
      const rp = cameraPitch * Math.PI / 180;

      camera.position.x = player.position.x - distance * Math.sin(ry) * Math.cos(rp);
      camera.position.z = player.position.z - distance * Math.cos(ry) * Math.cos(rp);
      camera.position.y = player.position.y + height + distance * Math.sin(rp);

      camera.lookAt(player.position.x, player.position.y + 4.2, player.position.z);
    }

    function animate() {
      requestAnimationFrame(animate);
      updateMovement();
      updateCamera();
      renderer.render(scene, camera);
    }

    animate();

    // Responsivo
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
